[General]
; Automatic rotation speed.
; Valid range: 0-10.
; Default: 0.3
fRotationSpeed=0.3

; Resume delay after manual rotation.
; Valid range: 0-10.
; Default: 0.35
fResumeDelaySeconds=0.35

; Continue spinning briefly after manual drag.
; Default: true
bManualSpinAfterDrag=true

; How long the release spin takes to settle.
; Valid range: 0.1-5.
; Default: 1.2
fManualSpinDurationSeconds=1.2

; Release spin strength multiplier.
; Valid range: 0-3.
; Default: 1
fManualSpinStrength=1
